<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gemini Enterprise 핸즈온 가이드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#008B74;
    --primary-dark:#073B33;
    --accent:#00A88F;
    --accent-hover:#00C49F;
    --accent-light:#E6F7F4;
    --bg:#F5FAF8;
    --card:#FFFFFF;
    --border:#D1EAE5;
    --gray:#5A736E;
    --ink:#1F3330;
    --codebg:#F0F7F5;
    --code-accent:#0B6E5C;
    --gold:#FFC83D;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Outfit', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height:1.75;font-size:16px; -webkit-font-smoothing:antialiased}
  header.top{background:radial-gradient(circle at 85% 30%, rgba(0, 168, 143, 0.2) 0%, rgba(0, 168, 143, 0) 50%), linear-gradient(135deg, #092620, #031411);color:#fff;padding:28px 20px;border-bottom:3px solid var(--accent)}
  header.top .wrap{max-width:1100px;margin:auto}
  header.top h1{margin:0;font-size:24px;font-weight:700;letter-spacing:-0.02em;background:linear-gradient(to right, #ffffff, #80E5D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:inline-block}
  header.top p{margin:6px 0 0;color:#80E5D4;font-size:13px;font-weight:500}
  header.top .hint{margin-top:12px;display:inline-block;background:rgba(0, 168, 143, 0.12);
    border:1px solid rgba(0, 168, 143, 0.25);border-radius:8px;padding:6px 14px;font-size:13px;color:#E0F2F1}
  .layout{display:flex;gap:36px;max-width:1100px;margin:32px auto 60px;padding:0 20px}
  aside{position:sticky;top:24px;align-self:flex-start;flex:0 0 230px;max-height:calc(100vh - 48px);overflow:auto}
  aside .toctitle{font-size:12px;font-weight:700;color:var(--gray);letter-spacing:.08em;text-transform:uppercase;margin:0 0 10px;padding-left:8px}
  #toc{display:flex;flex-direction:column;gap:3px}
  #toc a{color:var(--primary-dark);text-decoration:none;font-size:13px;padding:6px 10px;border-radius:6px;border-left:3px solid transparent;transition:all .2s ease;font-weight:500}
  #toc a:hover{background:var(--accent-light);border-left-color:var(--accent);color:var(--primary);padding-left:12px}
  #toc a.lv3{padding-left:20px;font-size:12px;color:var(--gray)}
  #toc a.lv3:hover{padding-left:22px}
  main{flex:1;min-width:0}
  main h1{font-size:28px;color:var(--primary-dark);margin:.2em 0 .5em;font-weight:800;letter-spacing:-0.02em}
  main h2{font-size:22px;color:var(--primary-dark);margin:1.8em 0 .6em;padding-bottom:.4em;border-bottom:2px solid var(--border);font-weight:700;letter-spacing:-0.01em}
  main h3{font-size:17px;color:var(--primary);margin:1.4em 0 .5em;font-weight:600}
  main blockquote{margin:1.2em 0;padding:10px 16px;background:var(--accent-light);border-left:4px solid var(--accent);
    border-radius:0 8px 8px 0;color:var(--primary-dark)}
  main table{border-collapse:collapse;width:100%;margin:1.5em 0;font-size:14px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 6px -1px rgba(0, 139, 116, 0.05), 0 2px 4px -1px rgba(0, 139, 116, 0.03);border:1px solid var(--border)}
  main th,main td{border:1px solid var(--border);padding:10px 12px;text-align:left;vertical-align:top}
  main th{background:var(--primary);color:#fff;font-weight:700;font-size:14px;border:none}
  main td:first-child{background:var(--accent-light);font-weight:600;color:var(--primary-dark)}
  main tr{transition:background-color 0.2s ease}
  main tr:hover{background-color:rgba(0, 168, 143, 0.02)}
  main a{color:var(--accent);text-decoration:none;font-weight:500;transition:color 0.2s ease}
  main a:hover{color:var(--accent-hover);text-decoration:underline}
  main :not(pre)>code{background:var(--accent-light);border:1px solid var(--border);border-radius:5px;
    padding:2px 6px;font-size:.9em;color:var(--code-accent);font-weight:500}
  main pre{position:relative;background:var(--codebg);border:1px solid var(--border);border-left:5px solid var(--primary);
    border-radius:10px;padding:18px;margin:1.2em 0;overflow:auto;box-shadow:0 4px 6px -1px rgba(0, 0, 0, 0.03)}
  main pre code{display:block;white-space:pre-wrap;word-break:break-word;font-size:14px;line-height:1.7;
    color:var(--primary-dark);font-family:"SF Mono",Menlo,Consolas,monospace;background:none;border:none;padding:0}
  button.copy{position:absolute;top:10px;right:10px;background:var(--primary);color:#fff;border:none;
    border-radius:6px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;opacity:.9;transition:all 0.2s ease}
  button.copy:hover{opacity:1;background:var(--accent);transform:scale(1.02)}
  button.copy.done{background:var(--accent-hover)}
  .err{background:#FEF2F2;border:1px solid #FCA5A5;color:#B91C1C;padding:14px;border-radius:8px}
  footer{max-width:1100px;margin:40px auto 60px;padding:20px;background:linear-gradient(135deg, var(--primary), var(--accent));color:#fff;border-radius:12px;box-shadow:0 4px 15px rgba(0, 139, 116, 0.15)}
  .footer-wrap{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;font-size:14px;font-weight:500}
  .footer-icon{font-size:16px}
  .footer-divider{opacity:0.6;margin:0 4px}
  .footer-contact{font-weight:600}
  .footer-contact a{color:#fff !important;text-decoration:underline !important}
  .footer-contact a:hover{color:var(--accent-light) !important}
  main img {max-width: 100%; height: auto; border: 1px solid var(--border); border-radius: 12px; margin: 1.5em 0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.05); transition: transform 0.2s ease, box-shadow 0.2s ease}
  main img:hover {transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)}
  @media(max-width:820px){
    .layout{flex-direction:column;gap:16px;margin-top:16px}
    aside{position:static;flex:none;max-height:none;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px}
    main pre code{font-size:14px}
    button.copy{padding:8px 14px;font-size:13px}
  }
</style>
</head>
<body>
  <header class="top"><div class="wrap">
    <h1>✦ Gemini Enterprise 핸즈온 가이드</h1>
    <p>LG CNS × Gemini Enterprise · 2026-07-10 · GFC 21F Madang</p>
    <span class="hint">📋 각 프롬프트 우측 <b>복사</b> 버튼을 눌러 채팅창에 붙여넣으세요</span>
  </div></header>

  <div class="layout">
    <aside><p class="toctitle">목차</p><nav id="toc"></nav></aside>
    <main id="content"><p>불러오는 중…</p></main>
  </div>

  <footer>
    <div class="footer-wrap">
      <span class="footer-icon">✦</span>
      <span class="footer-text">본 가이드의 모든 프롬프트는 우측 상단 <b>[복사]</b> 버튼을 눌러 그대로 사용하실 수 있습니다.</span>
      <span class="footer-divider">|</span>
      <span class="footer-contact">관련 문의: <a href="mailto:googlecloud@lgcns.com">googlecloud@lgcns.com</a></span>
    </div>
  </footer>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
function slug(t){return t.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^\w가-힣\-]/g,'');}
function enhance(root){
  var toc=document.getElementById('toc');
  root.querySelectorAll('h2,h3').forEach(function(h,i){
    var id='s'+i+'-'+slug(h.textContent).slice(0,28); h.id=id;
    var a=document.createElement('a'); a.href='#'+id; a.textContent=h.textContent;
    a.className=(h.tagName==='H3')?'lv3':'lv2'; toc.appendChild(a);
  });
  root.querySelectorAll('pre').forEach(function(pre){
    var btn=document.createElement('button'); btn.className='copy'; btn.type='button'; btn.textContent='복사';
    btn.addEventListener('click',function(){
      var code=pre.querySelector('code'); var text=(code?code.innerText:pre.innerText).replace(/\n$/,'');
      function ok(){btn.textContent='복사됨!';btn.classList.add('done');setTimeout(function(){btn.textContent='복사';btn.classList.remove('done');},1500);}
      function fb(){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}ta.remove();ok();}
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(ok,fb);}else{fb();}
    });
    pre.appendChild(btn);
  });
}
(function(){
  var el=document.getElementById('content');
  fetch('handson.md',{cache:'no-store'}).then(function(r){if(!r.ok)throw 0;return r.text();}).then(function(md){
    if(typeof marked==='undefined'){el.innerHTML='<div class="err">렌더러(marked)를 불러오지 못했습니다. 네트워크 확인 후 새로고침하세요.</div>';return;}
    el.innerHTML=marked.parse(md); enhance(el);
  }).catch(function(){
    el.innerHTML='<div class="err"><b>handson.md를 불러오지 못했습니다.</b><br>이 페이지는 GitHub Pages 같은 <b>웹 서버</b>에서 열어야 합니다(로컬 파일로 직접 열면 동작하지 않습니다).</div>';
  });
})();
</script>
</body>
</html>
