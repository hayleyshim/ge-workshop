<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gemini Enterprise 워크샵 가이드</title>
<style>
  :root{
    --navy:#0B2447; --navy2:#19376D; --mid:#576CBC; --light:#A5D7E8;
    --bg:#F8FAFC; --card:#FFFFFF; --border:#E2E8F0; --gray:#6B7280;
    --ink:#1F2937; --codebg:#EEF3FB; --gold:#FFC83D;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Malgun Gothic",sans-serif;
    line-height:1.7;font-size:16px}
  header.top{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:20px 20px 0}
  header.top .wrap{max-width:1100px;margin:auto}
  header.top h1{margin:0;font-size:21px}
  header.top p{margin:6px 0 0;color:var(--light);font-size:13px}
  header.top .hint{margin:10px 0 14px;display:inline-block;background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:6px 12px;font-size:13px}
  nav.tabs{max-width:1100px;margin:6px auto 0;display:flex;gap:6px}
  nav.tabs a{color:var(--light);text-decoration:none;font-size:14px;font-weight:700;
    padding:9px 16px;border-radius:10px 10px 0 0;background:rgba(255,255,255,.08)}
  nav.tabs a.active{background:var(--bg);color:var(--navy)}
  .layout{display:flex;gap:32px;max-width:1100px;margin:24px auto 60px;padding:0 20px}
  aside{position:sticky;top:16px;align-self:flex-start;flex:0 0 230px;max-height:calc(100vh - 32px);overflow:auto}
  aside .toctitle{font-size:12px;font-weight:700;color:var(--gray);letter-spacing:.04em;margin:0 0 8px}
  #toc{display:flex;flex-direction:column;gap:2px}
  #toc a{color:var(--navy2);text-decoration:none;font-size:13px;padding:4px 8px;border-radius:6px;border-left:2px solid transparent}
  #toc a:hover{background:#fff;border-left-color:var(--mid)}
  #toc a.lv3{padding-left:20px;font-size:12px;color:var(--gray)}
  main{flex:1;min-width:0}
  main h1{font-size:26px;color:var(--navy);margin:.2em 0 .4em}
  main h2{font-size:20px;color:var(--navy);margin:1.6em 0 .5em;padding-bottom:.3em;border-bottom:2px solid var(--border)}
  main h3{font-size:16px;color:var(--navy2);margin:1.3em 0 .4em}
  main blockquote{margin:1em 0;padding:.6em 1em;background:#EAF1FB;border-left:4px solid var(--mid);
    border-radius:6px;color:var(--navy2)}
  main table{border-collapse:collapse;width:100%;margin:1em 0;font-size:14px;background:#fff}
  main th,main td{border:1px solid var(--border);padding:8px 10px;text-align:left;vertical-align:top}
  main th{background:var(--navy);color:#fff;font-weight:700}
  main td:first-child{background:#EAF1FB;font-weight:600;color:var(--navy)}
  main a{color:#2563EB}
  main :not(pre)>code{background:#EEF1F5;border:1px solid var(--border);border-radius:5px;
    padding:1px 6px;font-size:.92em;color:var(--navy2)}
  main pre{position:relative;background:var(--codebg);border:1px solid #D6E0F0;border-left:5px solid var(--navy2);
    border-radius:10px;padding:16px 16px 16px 18px;margin:.8em 0;overflow:auto}
  main pre code{display:block;white-space:pre-wrap;word-break:break-word;font-size:15px;line-height:1.65;
    color:#13243f;font-family:"SF Mono",Menlo,Consolas,"Noto Sans KR",monospace,sans-serif;background:none;border:none;padding:0}
  button.copy{position:absolute;top:8px;right:8px;background:var(--navy);color:#fff;border:none;
    border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;opacity:.92}
  button.copy:hover{opacity:1}
  button.copy.done{background:#16A34A}
  .err{background:#FEF2F2;border:1px solid #FCA5A5;color:#B91C1C;padding:14px;border-radius:8px}
  footer{max-width:1100px;margin:0 auto 40px;padding:0 20px;color:var(--gray);font-size:13px}
  @media(max-width:820px){
    .layout{flex-direction:column;gap:12px;margin-top:14px}
    aside{position:static;flex:none;max-height:none;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px}
    main pre code{font-size:16px}
    button.copy{padding:8px 14px;font-size:13px}
    nav.tabs a{font-size:13px;padding:8px 12px}
  }
</style>
</head>
<body>
  <header class="top"><div class="wrap">
    <h1 id="h-title">✦ Gemini Enterprise 워크샵</h1>
    <p id="h-sub"></p>
    <span class="hint" id="h-hint"></span>
    <nav class="tabs">
      <a id="tab-handson" href="?d=handson">청중 핸즈온</a>
      <a id="tab-console" href="?d=console">호스트 구축 (A~E)</a>
    </nav>
  </div></header>

  <div class="layout">
    <aside><p class="toctitle">목차</p><nav id="toc"></nav></aside>
    <main id="content"><p>불러오는 중…</p></main>
  </div>

  <footer id="foot"></footer>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
var DOCS={
  handson:{file:'handson.md', title:'✦ Gemini Enterprise 핸즈온 가이드',
    sub:'LG CNS × Gemini Enterprise · 2026-07-10 · GFC 21F Madang',
    hint:'📋 각 프롬프트 우측 <b>복사</b> 버튼을 눌러 채팅창에 붙여넣으세요',
    foot:'본 가이드의 모든 프롬프트는 그대로 복사해 사용하실 수 있습니다.'},
  console:{file:'console.md', title:'🛠 호스트 구축 가이드 (A~E)',
    sub:'진행자용 · Gemini Enterprise 콘솔 단계별 설정',
    hint:'💻 각 명령어 우측 <b>복사</b> 버튼으로 그대로 실행하세요',
    foot:'호스트(진행자)용 환경 구축 단계입니다. 코드 블록은 복사해 Cloud Shell에서 실행하세요.'}
};
function qd(){var m=location.search.match(/[?&]d=([^&]+)/);var d=m?decodeURIComponent(m[1]):'handson';return DOCS[d]?d:'handson';}
function slug(t){return t.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^\w가-힣\-]/g,'');}
function enhance(root){
  var toc=document.getElementById('toc');
  root.querySelectorAll('h2,h3').forEach(function(h,i){
    var id='s'+i+'-'+slug(h.textContent).slice(0,28); h.id=id;
    var a=document.createElement('a'); a.href='#'+id; a.textContent=h.textContent;
    a.className=(h.tagName==='H3')?'lv3':'lv2'; toc.appendChild(a);
  });
  root.querySelectorAll('pre').forEach(function(pre){
    var btn=document.createElement('button'); btn.className='copy'; btn.type='button'; btn.textContent='복사';
    btn.addEventListener('click',function(){
      var code=pre.querySelector('code'); var text=(code?code.innerText:pre.innerText).replace(/\n$/,'');
      function ok(){btn.textContent='복사됨!';btn.classList.add('done');setTimeout(function(){btn.textContent='복사';btn.classList.remove('done');},1500);}
      function fb(){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}ta.remove();ok();}
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(ok,fb);}else{fb();}
    });
    pre.appendChild(btn);
  });
}
(function(){
  var d=qd(), cfg=DOCS[d];
  document.title=cfg.title.replace(/^[^ ]+ /,'')+' — Gemini Enterprise 워크샵';
  document.getElementById('h-title').textContent=cfg.title;
  document.getElementById('h-sub').textContent=cfg.sub;
  document.getElementById('h-hint').innerHTML=cfg.hint;
  document.getElementById('foot').textContent=cfg.foot;
  document.getElementById('tab-'+d).classList.add('active');
  var el=document.getElementById('content');
  fetch(cfg.file,{cache:'no-store'}).then(function(r){if(!r.ok)throw 0;return r.text();}).then(function(md){
    if(typeof marked==='undefined'){el.innerHTML='<div class="err">렌더러(marked)를 불러오지 못했습니다. 네트워크 확인 후 새로고침하세요.</div>';return;}
    el.innerHTML=marked.parse(md); enhance(el);
  }).catch(function(){
    el.innerHTML='<div class="err"><b>'+cfg.file+'를 불러오지 못했습니다.</b><br>이 페이지는 GitHub Pages 같은 <b>웹 서버</b>에서 열어야 합니다(로컬 파일로 직접 열면 동작하지 않습니다).</div>';
  });
})();
</script>
</body>
</html>
